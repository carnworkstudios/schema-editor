<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description"
        content="SVG Wiring Diagram Editor; mobile-first, touch-optimized tool for viewing, tracing, and analyzing SVG wiring diagrams, circuit schematics, and network diagrams.">
    <meta name="keywords"
        content="SVG editor, wiring diagram, circuit schematic, wire tracing, component highlight, pan zoom rotate, touch gestures, CAD viewer">
    <title>SVG Wiring Editor; CANWORKSTUDIOS</title>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://unpkg.com/imagetracer-js@1.2.6/imagetracer_v1.2.6.js"></script>

    <!-- Shared portfolio styles + TIFANY base (header, sidebar-nav, logo-accent) -->
    <link rel="stylesheet" href="../../../assets/css/portfolio.css">
    <link rel="stylesheet" href="../../tifany/dist/tifany.min.css">

    <!-- Tool-specific styles -->
    <link rel="stylesheet" href="css/svgEditorUI.css">
    <link rel="stylesheet" href="css/wiringDiagram.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Shared sidebar-nav component -->
    <script src="../../../assets/components/sidebar-nav.js"></script>
    <!-- Shared portfolio JS (optional, for any portfolio-wide init) -->
    <script src="../../../assets/js/portfolio.js"></script>
</head>

<body class="dark-mode">
    <div class="app-container">

        <!-- ======================================================
         HEADER; TIFANY-style banner
         ====================================================== -->
        <header class="tifany-header">
            <div class="logo">
                <h1>
                    <a href="../../../index.html" style="text-decoration:none;color:inherit;">
                        canwork<span class="logo-accent">studios</span>
                    </a>
                </h1>
                <small class="tool-subtitle">SVG Wiring Editor</small>
            </div>

            <nav class="nav" style="flex:1; justify-content: center;">
                <!-- Icon-rail sidebar navigation -->
                <div id="sidebar-nav-mount"></div>
                <!-- <a href="../../../index.html#contact"  class="nav-link">Contact</a>
            <a href="https://github.com/bonzai2carn" target="_blank" class="nav-link">GitHub</a> -->
            </nav>

            <button id="darkModeBtn" class="theme-toggle-btn" title="Toggle dark/light" aria-label="Toggle dark mode">
                <iconify-icon icon="material-symbols:dark-mode-outline" style="font-size:16px;"></iconify-icon>
            </button>
        </header>

        <!-- ======================================================
         SECONDARY TOOLBAR; Trace switch + utility buttons
         ====================================================== -->
        <div class="custom-bar header-right">
            <div class="header-right" style="padding:4px 8px;width:100%;">

                <div class="control-group-flex" style="margin-left:auto;">
                    <!-- Undo / Redo -->
                    <button class="btn" id="undoBtn" title="Undo (Ctrl+Z)" disabled>
                        <iconify-icon icon="material-symbols:undo"></iconify-icon>
                        <span class="panel-content">Undo</span>
                    </button>
                    <button class="btn" id="redoBtn" title="Redo (Ctrl+Y)" disabled>
                        <iconify-icon icon="material-symbols:redo"></iconify-icon>
                        <span class="panel-content">Redo</span>
                    </button>

                    <!-- Load -->
                    <button class="btn" id="loadFileBtn" title="Load SVG File">
                        <iconify-icon icon="material-symbols:folder-open-outline"></iconify-icon>
                        <span class="panel-content">Load</span>
                    </button>

                    <!-- Toolbar toggle -->
                    <button class="btn" id="toggleControlsBtn" title="Toggle bottom toolbar">
                        <iconify-icon icon="material-symbols:settings-outline"></iconify-icon>
                        <span class="panel-content">Toolbar</span>
                    </button>
                </div>
                <!-- Wire trace toggle -->
                <small class="switch-content">
                    <iconify-icon icon="material-symbols:bolt" style="font-size:14px;color:#4facfe;"></iconify-icon>
                    Trace
                </small>
                <div class="switch" id="traceWireBtn" title="Wire Trace ON/OFF" role="switch" aria-checked="false">
                    <input type="checkbox" aria-label="Toggle wire tracing">
                    <span class="switch-slider"></span>
                </div>


            </div>
        </div>

        <!-- ======================================================
         ACCORDION TOOLBAR; Wiring / Export / Edit sections
         ====================================================== -->
        <div class="custom-bar">

            <!-- Wiring section -->
            <button class="accordion active slide-bar" aria-label="Wiring tools">
                <h3>Wiring</h3>
            </button>
            <div class="panel control-group-flex">
                <button class="btn" id="highlightComponentsBtn" title="Highlight Components">
                    <iconify-icon icon="material-symbols:highlight"></iconify-icon>
                    <span class="panel-content">Highlight</span>
                </button>
                <button class="btn" id="showConnectionsBtn" title="Show Connections">
                    <iconify-icon icon="material-symbols:cable"></iconify-icon>
                    <span class="panel-content">Connections</span>
                </button>
                <button class="btn" id="clearHighlightsBtn" title="Clear All Highlights">
                    <iconify-icon icon="material-symbols:clear-all"></iconify-icon>
                    <span class="panel-content">Clear</span>
                </button>
            </div>

            <!-- Export section -->
            <button class="accordion slide-bar" aria-label="Export tools">
                <h3>Export</h3>
            </button>
            <div class="panel control-group-flex">
                <button class="btn" id="exportViewBtn" title="Export current diagram as SVG">
                    <iconify-icon icon="material-symbols:upload-file-outline"></iconify-icon>
                    <span class="panel-content">SVG</span>
                </button>
                <button class="btn" id="exportHtmlBtn" title="Export current diagram as HTML">
                    <iconify-icon icon="material-symbols:html"></iconify-icon>
                    <span class="panel-content">HTML</span>
                </button>
                <button class="btn" id="exportJsonBtn" title="Export diagram data as JSON">
                    <iconify-icon icon="material-symbols:data-object"></iconify-icon>
                    <span class="panel-content">JSON</span>
                </button>
                <button class="btn" id="batchExportBtn" title="Batch export all loaded diagrams as SVG">
                    <iconify-icon icon="material-symbols:download-for-offline-outline"></iconify-icon>
                    <span class="panel-content">Batch</span>
                </button>
            </div>

            <!-- Edit section (coming soon) -->
            <button class="accordion active slide-bar" aria-label="Edit tools">
                <h3>Edit</h3>
            </button>
            <div class="panel control-group-flex">
                <span
                    style="font-size:11px;color:rgb(129 133 148);padding:6px 8px;display:flex;align-items:center;gap:4px;">
                    <iconify-icon icon="material-symbols:edit-outline" style="font-size:13px;"></iconify-icon>
                    Coming soon
                </span>
            </div>

        </div>

        <!-- ======================================================
         MAIN AREA; Sidebar nav + SVG viewer
         ====================================================== -->
        <div class="main-layout">

            <!-- SVG canvas -->
            <main class="svg-viewer">
                <div class="svg-container" id="svgContainer">
                    <div class="svg-wrapper" id="svgWrapper">
                        <svg id="svgDisplay" width="400" height="300" viewBox="0 0 400 300">
                            <defs>
                                <filter id="glow">
                                    <feGaussianBlur stdDeviation="3" result="coloredBlur" />
                                    <feMerge>
                                        <feMergeNode in="coloredBlur" />
                                        <feMergeNode in="SourceGraphic" />
                                    </feMerge>
                                </filter>
                                <filter id="wire-glow">
                                    <feGaussianBlur stdDeviation="2" result="coloredBlur" />
                                    <feMerge>
                                        <feMergeNode in="coloredBlur" />
                                        <feMergeNode in="SourceGraphic" />
                                    </feMerge>
                                </filter>
                            </defs>
                            <text x="200" y="145" text-anchor="middle" fill="rgba(0,0,0,0.35)" font-size="14"
                                font-family="Inter,sans-serif">
                                Tap Load to upload your wiring diagram
                            </text>
                            <text x="200" y="165" text-anchor="middle" fill="rgba(0,0,0,0.2)" font-size="11"
                                font-family="Inter,sans-serif">
                                Supports .svg files
                            </text>
                        </svg>
                    </div>
                    <div class="loading" id="loadingIndicator" style="display:none;color:rgba(255,255,255,0.7);">
                        Loading diagram...
                    </div>
                </div>
            </main>

        </div><!-- /.main-layout -->

        <!-- ======================================================
         TIMELINE PANEL; thumbnail filmstrip, toggled by Timeline btn
         ====================================================== -->
        <div class="timeline-panel" id="timelinePanel">
            <div class="timeline-tracks" id="timelineTracks">
                <!-- Populated by buildTimeline() -->
            </div>
        </div>

        <!-- ======================================================
         BOTTOM CONTROLS
         ====================================================== -->
        <div class="bottom-controls" id="bottomControls">

            <div class="control-btn" id="zoomInBtn" title="Zoom In">
                <div class="icon"><iconify-icon icon="material-symbols:zoom-in" style="font-size:20px;"></iconify-icon>
                </div>
                <div>Zoom In</div>
            </div>

            <div class="control-btn" id="zoomOutBtn" title="Zoom Out">
                <div class="icon"><iconify-icon icon="material-symbols:zoom-out" style="font-size:20px;"></iconify-icon>
                </div>
                <div>Zoom Out</div>
            </div>

            <div class="control-btn" id="fitViewBtn" title="Fit View">
                <div class="icon"><iconify-icon icon="material-symbols:fit-screen-outline"
                        style="font-size:20px;"></iconify-icon></div>
                <div>Fit View</div>
            </div>

            <div class="control-btn" id="resetViewBtn" title="Reset View">
                <div class="icon"><iconify-icon icon="material-symbols:reset-focus"
                        style="font-size:20px;"></iconify-icon></div>
                <div>Reset</div>
            </div>

            <div class="control-btn" id="rotateBtn" title="Rotate Right 90°">
                <div class="icon"><iconify-icon icon="material-symbols:rotate-90-degrees-cw-outline"
                        style="font-size:20px;"></iconify-icon></div>
                <div>Rotate R</div>
            </div>

            <div class="control-btn" id="rotateLeftBtn" title="Rotate Left 90°">
                <div class="icon"><iconify-icon icon="material-symbols:rotate-90-degrees-ccw-outline"
                        style="font-size:20px;"></iconify-icon></div>
                <div>Rotate L</div>
            </div>

            <div class="control-btn" id="transformBtn" title="Transform / Side Panel">
                <div class="icon"><iconify-icon icon="material-symbols:transform"
                        style="font-size:20px;"></iconify-icon></div>
                <div>Transform</div>
            </div>

            <div class="control-btn" id="measureBtn" title="Measure Distance">
                <div class="icon"><iconify-icon icon="material-symbols:straighten-outline"
                        style="font-size:20px;"></iconify-icon></div>
                <div>Measure</div>
            </div>

            <div class="control-btn" id="layersBtn" title="Layers Panel">
                <div class="icon"><iconify-icon icon="material-symbols:layers-outline"
                        style="font-size:20px;"></iconify-icon></div>
                <div>Layers</div>
            </div>

            <div class="control-btn" id="timelineBtn" title="Timeline; all loaded diagrams">
                <div class="icon"><iconify-icon icon="material-symbols:video-library-outline"
                        style="font-size:20px;"></iconify-icon></div>
                <div>Timeline</div>
            </div>

        </div><!-- /.bottom-controls -->

        <!-- ======================================================
         SIDE PANEL; Layers + View Controls
         ====================================================== -->
        <div class="side-panel" id="sidePanel">
            <button class="side-panel-close" id="closePanelBtn" title="Close panel">
                <iconify-icon icon="material-symbols:close"></iconify-icon>
            </button>

            <!-- Layers tree -->
            <div class="control-group" style="margin-top:44px;">
                <h3 style="display:flex;align-items:center;gap:6px;">
                    <iconify-icon icon="material-symbols:layers-outline"></iconify-icon>
                    Layers
                </h3>
                <div id="layersPanel" class="layers-tree"
                    style="max-height:280px;overflow-y:auto;border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:6px;margin-top:6px;">
                    <!-- Populated by layers.js -->
                </div>
            </div>

            <!-- View controls (2D + 3D sliders) -->
            <div class="control-group">
                <h3>View Controls</h3>

                <div class="slider-group">
                    <label>Zoom</label>
                    <input type="range" id="zoomSlider" class="slider" min="0.1" max="10" step="0.1" value="1">
                    <div class="value-display">Scale: <span id="zoomValue">1.0</span>x</div>
                </div>

                <div class="slider-group">
                    <label>Rotation</label>
                    <input type="range" id="rotationSlider" class="slider" min="-180" max="180" step="1" value="0">
                    <div class="value-display">Angle: <span id="rotationValue">0</span>°</div>
                </div>

                <div class="slider-group">
                    <label>Pitch (Rotate X)</label>
                    <input type="range" id="pitchSlider" class="slider" min="-60" max="60" step="1" value="0">
                    <div class="value-display">Pitch: <span id="pitchValue">0</span>°</div>
                </div>

                <div class="slider-group">
                    <label>Yaw (Rotate Y)</label>
                    <input type="range" id="rotateYSlider" class="slider" min="0" max="90" step="1" value="0">
                    <div class="value-display">Yaw: <span id="rotateYValue">0</span>°</div>
                </div>

                <div class="slider-group">
                    <label>Perspective</label>
                    <input type="range" id="perspectiveSlider" class="slider" min="500" max="3000" step="100"
                        value="1500">
                    <div class="value-display">Distance: <span id="perspectiveValue">1500</span>px</div>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast" role="status" aria-live="polite"></div>

        <!-- ======================================================
         MEASURE MODAL; unit scale setup
         ====================================================== -->
        <div class="modal-backdrop" id="measureModal" role="dialog" aria-modal="true" aria-label="Measure unit scale">
            <div class="modal">
                <h3 class="modal-title">
                    <iconify-icon icon="material-symbols:straighten-outline" style="font-size:16px;"></iconify-icon>
                    Measure Scale
                </h3>

                <!-- System tabs -->
                <div class="measure-tabs">
                    <button class="measure-tab active" data-system="px">Pixels</button>
                    <button class="measure-tab" data-system="metric">Metric</button>
                    <button class="measure-tab" data-system="imperial">Imperial</button>
                </div>

                <!-- Pixel (no-scale) group -->
                <div class="measure-unit-group" data-system="px">
                    <div class="measure-unit-btns">
                        <button class="measure-unit-btn active" data-unit="px">px</button>
                    </div>
                    <p class="measure-hint">Distances shown in raw screen pixels.</p>
                </div>

                <!-- Metric group -->
                <div class="measure-unit-group" data-system="metric" style="display:none;">
                    <div class="measure-unit-btns">
                        <button class="measure-unit-btn" data-unit="mm">mm</button>
                        <button class="measure-unit-btn" data-unit="cm">cm</button>
                        <button class="measure-unit-btn" data-unit="m">m</button>
                    </div>
                </div>

                <!-- Imperial group -->
                <div class="measure-unit-group" data-system="imperial" style="display:none;">
                    <div class="measure-unit-btns">
                        <button class="measure-unit-btn" data-unit="in">in</button>
                        <button class="measure-unit-btn" data-unit="ft">ft</button>
                        <button class="measure-unit-btn" data-unit="yd">yd</button>
                    </div>
                </div>

                <!-- Shared scale row (hidden when px tab active) -->
                <div class="measure-scale-row" id="measureScaleRow" style="display:none;">
                    <input type="number" id="measurePxVal" class="measure-scale-input" value="1" min="0.001" step="any">
                    <span class="measure-scale-sep">px =</span>
                    <input type="number" id="measureUnitVal" class="measure-scale-input" value="1" min="0.001"
                        step="any">
                    <span class="measure-scale-unit-label" id="measureScaleUnitLabel">mm</span>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-ghost" id="measureModalCancel">Cancel</button>
                    <button class="btn btn-primary" id="measureModalOk">Start Measuring</button>
                </div>
            </div>
        </div>

    </div><!-- /.app-container -->

    <!-- Hidden file input; multiple for batch upload -->
    <input type="file" id="hiddenFileInput" multiple
        accept=".svg,.svgz,image/svg+xml,.pdf,application/pdf,.png,image/png,.jpg,.jpeg,image/jpeg,.bmp,image/bmp,.tif,.tiff,image/tiff,.plt,.hpgl,.dwf,.dwfx"
        style="display:none;">

    <!-- ============================================================
     JS; feature files loaded in dependency order
     core → features → init
     ============================================================ -->
    <script src="js/core/svgEditor.js"></script>
    <script src="js/features/viewTransform.js"></script>
    <script src="js/features/wiringDiagram.js"></script>
    <script src="js/features/wireTracing.js"></script>
    <script src="js/features/highlights.js"></script>
    <script src="js/features/layers.js"></script>
    <script src="js/features/history.js"></script>
    <script src="js/features/uiControls.js"></script>

    <script>
        $(document).ready(function () {
            window.editor = new MobileSVGEditor();

            // Sidebar nav; mark SVG Editor as the active tool
            if (window.SidebarNav) {
                SidebarNav.render('#sidebar-nav-mount', 'SVG Editor');
            }

            // Service Worker (offline capability)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(() => { });
            }
        });
    </script>

</body>

</html>
